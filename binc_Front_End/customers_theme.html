<!DOCTYPE html>
<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
    darkMode: "class",
    theme: { extend: { colors: {
        "surface-container-highest": "#e0e3e3", "secondary": "#3d6a00",
        "primary": "#003336", "surface-container": "#ebeeee", "on-error-container": "#93000a",
        "surface": "#f7fafa", "on-primary": "#ffffff", "surface-container-lowest": "#ffffff",
        "surface-variant": "#e0e3e3", "primary-container": "#004b50", "error-container": "#ffdad6",
        "background": "#f7fafa", "on-surface-variant": "#404849", "on-surface": "#181c1d",
        "surface-container-low": "#f1f4f4", "surface-container-high": "#e6e9e9", "error": "#ba1a1a"
    }, fontFamily: { "headline": ["Manrope"], "body": ["Inter"] } } }
}
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .bento-leaf { border-radius: 0.75rem 0.375rem 0.75rem 0.375rem; }
    body::-webkit-scrollbar { width: 8px; } body::-webkit-scrollbar-thumb { background: #b1edf2; border-radius: 4px; }
    .modal-scroll::-webkit-scrollbar { width: 6px; } .modal-scroll::-webkit-scrollbar-thumb { background: #b1edf2; border-radius: 3px; }
    input:focus, select:focus, textarea:focus { border-color: #003336 !important; box-shadow: 0 0 0 2px rgba(0,51,54,0.08); }
    .modal-overlay { animation: fadeIn 0.15s ease; }
    .modal-card { animation: slideUp 0.2s ease; }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes slideUp { from { opacity:0; transform: translateY(12px) } to { opacity:1; transform: translateY(0) } }
    .fade-in { animation: fadeIn 0.25s ease; }
</style>
</head>
<body class="bg-background text-on-surface font-body antialiased">
<main class="px-8 py-8 min-h-screen">

<!-- Header -->
<header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
    <div>
        <span class="text-xs font-bold text-on-surface-variant uppercase tracking-widest block mb-1">CRM</span>
        <h1 class="text-4xl font-extrabold font-headline text-primary tracking-tight">Clientes</h1>
    </div>
    <button onclick="pyAdd()" class="px-6 py-2.5 rounded-lg font-bold text-sm bg-gradient-to-br from-primary to-primary-container text-on-primary hover:from-secondary hover:to-secondary-container transition-all shadow-sm flex items-center gap-2">
        <span class="material-symbols-outlined text-[18px]">person_add</span> Novo Cliente
    </button>
</header>

<!-- Search -->
<div class="bg-surface-container-lowest p-5 bento-leaf border border-slate-200/50 shadow-sm flex gap-4 justify-between items-center mb-6">
    <div class="relative w-full md:w-96">
        <input type="text" id="inp_search" placeholder="Buscar por Nome, Telefone ou Veículo..." onkeyup="pySearch()" class="w-full pl-10 h-10 border border-surface-variant rounded-lg text-sm outline-none">
        <span class="material-symbols-outlined absolute left-3 top-2.5 text-on-surface-variant text-lg">search</span>
    </div>
    <span id="val_count" class="text-sm font-bold text-on-surface-variant whitespace-nowrap">0 clientes</span>
</div>

<!-- Table -->
<div class="bg-surface-container-lowest bento-leaf border border-slate-200/50 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
        <table class="w-full text-left table-auto min-w-[700px]">
            <thead class="bg-surface-container-low">
                <tr>
                    <th class="px-6 py-3 text-xs font-bold uppercase text-on-surface-variant tracking-wider">Cliente</th>
                    <th class="px-6 py-3 text-xs font-bold uppercase text-on-surface-variant tracking-wider w-40">Telefone</th>
                    <th class="px-6 py-3 text-xs font-bold uppercase text-on-surface-variant tracking-wider">Veículo / Placa</th>
                    <th class="px-6 py-3 text-xs font-bold uppercase text-on-surface-variant tracking-wider">Endereço</th>
                    <th class="px-6 py-3 text-xs font-bold uppercase text-on-surface-variant tracking-wider text-right w-32">Ações</th>
                </tr>
            </thead>
            <tbody id="table_body" class="divide-y divide-surface">
                <!-- Injetado via Python -->
            </tbody>
        </table>
    </div>
</div>
</main>

<!-- ══════════════════════════════════════════════════════════════════════ -->
<!-- MODAL: Cliente (Add / Edit)                                           -->
<!-- ══════════════════════════════════════════════════════════════════════ -->
<div id="modal_customer" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4 modal-overlay">
    <div class="bg-background bento-leaf w-full max-w-[520px] shadow-2xl flex flex-col max-h-[92vh] modal-card">

        <!-- Header -->
        <div class="px-6 pt-6 pb-4 border-b border-surface-variant flex items-center justify-between shrink-0">
            <div>
                <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1">CRM</span>
                <h2 id="modal_customer_title" class="text-2xl font-extrabold font-headline text-primary">Novo Cliente</h2>
            </div>
            <button onclick="closeCustomerModal()" class="w-9 h-9 rounded-lg bg-surface-container hover:bg-surface-container-high flex items-center justify-center text-on-surface-variant transition-colors">
                <span class="material-symbols-outlined text-lg">close</span>
            </button>
        </div>

        <!-- Body -->
        <div class="overflow-y-auto flex-1 px-6 py-5 modal-scroll space-y-4">

            <!-- Nome -->
            <div>
                <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Nome / Razão Social *</label>
                <input type="text" id="c_name" placeholder="Nome completo ou razão social..." class="w-full h-10 border border-surface-variant rounded-lg px-3 text-sm bg-surface-container-lowest"/>
            </div>

            <!-- Telefone -->
            <div>
                <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Telefone / WhatsApp</label>
                <div class="relative">
                    <input type="text" id="c_phone" placeholder="(DD) XXXXX-XXXX" class="w-full h-10 border border-surface-variant rounded-lg px-3 pl-10 text-sm bg-surface-container-lowest"/>
                    <span class="material-symbols-outlined absolute left-3 top-2.5 text-on-surface-variant text-lg">phone</span>
                </div>
            </div>

            <!-- Endereço -->
            <div>
                <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Endereço</label>
                <input type="text" id="c_address" placeholder="Endereço completo..." class="w-full h-10 border border-surface-variant rounded-lg px-3 text-sm bg-surface-container-lowest"/>
            </div>

            <!-- Veículo + Placa -->
            <div class="grid grid-cols-5 gap-3">
                <div class="col-span-3">
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Veículo</label>
                    <input type="text" id="c_vehicle" placeholder="Ex: Honda CG 160, Yamaha Factor..." class="w-full h-10 border border-surface-variant rounded-lg px-3 text-sm bg-surface-container-lowest"/>
                </div>
                <div class="col-span-2">
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Placa</label>
                    <input type="text" id="c_plate" placeholder="ABC-1234" maxlength="8" class="w-full h-10 border border-surface-variant rounded-lg px-3 text-sm font-bold tracking-widest text-center bg-surface-container-lowest" oninput="this.value=this.value.toUpperCase()"/>
                </div>
            </div>

            <!-- Dica WhatsApp -->
            <div class="flex items-start gap-2 p-3 rounded-lg bg-[#25D366]/8 border border-[#25D366]/20">
                <span class="material-symbols-outlined text-[#25D366] text-lg mt-0.5 shrink-0">chat</span>
                <p class="text-xs text-on-surface-variant">Para novos clientes com telefone, o WhatsApp será aberto automaticamente para salvar o contato.</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-surface-variant flex justify-end gap-3 shrink-0 bg-surface-container-lowest/60">
            <button onclick="closeCustomerModal()" class="px-5 py-2.5 rounded-lg font-bold text-sm bg-surface-container text-primary hover:bg-surface-container-high transition-colors">
                Cancelar
            </button>
            <button onclick="saveCustomer()" class="px-6 py-2.5 rounded-lg font-bold text-sm bg-gradient-to-br from-primary to-primary-container text-on-primary hover:from-secondary hover:to-secondary-container transition-all shadow-sm flex items-center gap-2">
                <span class="material-symbols-outlined text-[16px]">save</span> Salvar Cliente
            </button>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════ -->
<!-- MODAL: Confirmar Exclusão                                             -->
<!-- ══════════════════════════════════════════════════════════════════════ -->
<div id="modal_confirm" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4 modal-overlay">
    <div class="bg-background bento-leaf w-full max-w-[400px] shadow-2xl p-6 modal-card">
        <div class="flex items-start gap-4 mb-6">
            <div class="w-12 h-12 rounded-full bg-error-container flex items-center justify-center shrink-0">
                <span class="material-symbols-outlined text-error text-2xl">person_remove</span>
            </div>
            <div>
                <h3 class="font-headline font-bold text-lg text-primary mb-1">Confirmar Exclusão</h3>
                <p id="confirm_msg" class="text-sm text-on-surface-variant">Deseja excluir este cliente?</p>
            </div>
        </div>
        <div class="flex gap-3 justify-end">
            <button onclick="closeConfirm()" class="px-5 py-2.5 rounded-lg font-bold text-sm bg-surface-container text-primary hover:bg-surface-container-high transition-colors">Cancelar</button>
            <button id="confirm_ok_btn" class="px-5 py-2.5 rounded-lg font-bold text-sm bg-error text-white hover:opacity-90 transition-opacity flex items-center gap-2">
                <span class="material-symbols-outlined text-[16px]">delete</span> Excluir
            </button>
        </div>
    </div>
</div>

<script>
    var _current_customer_id = '';

    function pySearch() {
        var q = document.getElementById('inp_search').value;
        window.location.href = "py://action/search?q=" + encodeURIComponent(q);
    }
    function pyAdd()      { window.location.href = "py://action/add"; }
    function pyEdit(id)   { window.location.href = "py://action/edit?id=" + encodeURIComponent(id); }
    function pyDel(id, name) { openConfirm(id, name); }
    function pyWhats(ph)  { window.location.href = "py://action/whats?phone=" + encodeURIComponent(ph); }

    function setTableData(htmlStr, qtStr) {
        document.getElementById('table_body').innerHTML = htmlStr;
        document.getElementById('val_count').innerText = qtStr;
    }

    // ── Customer Modal ─────────────────────────────────────────────────────
    function openCustomerModal(data) {
        data = data || {};
        _current_customer_id = data.id || '';
        document.getElementById('modal_customer_title').innerText = _current_customer_id ? 'Editar Cliente' : 'Novo Cliente';

        document.getElementById('c_name').value    = data.name    || '';
        document.getElementById('c_phone').value   = data.phone   || '';
        document.getElementById('c_address').value = data.address || '';
        document.getElementById('c_vehicle').value = data.veiculo || '';
        document.getElementById('c_plate').value   = data.placa   || '';

        showModal('modal_customer');
        setTimeout(function() { document.getElementById('c_name').focus(); }, 150);
    }

    function closeCustomerModal() { hideModal('modal_customer'); _current_customer_id = ''; }

    function saveCustomer() {
        var name = document.getElementById('c_name').value.trim();
        if (!name) { shakeField('c_name'); return; }

        var params = new URLSearchParams({
            id:      _current_customer_id,
            name:    name,
            phone:   document.getElementById('c_phone').value.trim(),
            address: document.getElementById('c_address').value.trim(),
            veiculo: document.getElementById('c_vehicle').value.trim(),
            placa:   document.getElementById('c_plate').value.trim().toUpperCase(),
        });
        closeCustomerModal();
        window.location.href = "py://action/modal_save?" + params.toString();
    }

    // ── Confirm Modal ──────────────────────────────────────────────────────
    function openConfirm(cid, name) {
        document.getElementById('confirm_msg').innerText = "Excluir o cliente \"" + name + "\"? Esta ação não pode ser desfeita.";
        document.getElementById('confirm_ok_btn').onclick = function() {
            closeConfirm();
            window.location.href = "py://action/del_confirm?id=" + encodeURIComponent(cid);
        };
        showModal('modal_confirm');
    }
    function closeConfirm() { hideModal('modal_confirm'); }

    // ── Utils ──────────────────────────────────────────────────────────────
    function showModal(id) { var el=document.getElementById(id); el.classList.remove('hidden'); el.classList.add('flex'); }
    function hideModal(id) { var el=document.getElementById(id); el.classList.add('hidden'); el.classList.remove('flex'); }
    function shakeField(id) {
        var el=document.getElementById(id); el.style.borderColor='#ba1a1a'; el.focus();
        setTimeout(function(){ el.style.borderColor=''; },2000);
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') { closeCustomerModal(); closeConfirm(); }
    });
    ['modal_customer','modal_confirm'].forEach(function(id) {
        document.getElementById(id).addEventListener('click', function(e) {
            if (e.target === this) { id === 'modal_customer' ? closeCustomerModal() : closeConfirm(); }
        });
    });
</script>
</body></html>
