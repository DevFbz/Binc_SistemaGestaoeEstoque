<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
    darkMode: "class",
    theme: { extend: { colors: {
        "surface-container-highest": "#e0e3e3", "secondary": "#3d6a00",
        "primary": "#003336", "surface-container": "#ebeeee", "on-error-container": "#93000a",
        "surface": "#f7fafa", "on-primary": "#ffffff", "surface-container-lowest": "#ffffff",
        "surface-variant": "#e0e3e3", "primary-container": "#004b50", "error-container": "#ffdad6",
        "background": "#f7fafa", "on-surface-variant": "#404849", "on-surface": "#181c1d",
        "surface-container-high": "#e6e9e9", "error": "#ba1a1a"
    }, fontFamily: { "headline": ["Manrope"], "body": ["Inter"] } } }
}
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .bento-leaf { border-radius: 0.75rem 0.375rem 0.75rem 0.375rem; }
    body::-webkit-scrollbar { width: 8px; } body::-webkit-scrollbar-thumb { background: #5a6b6c; border-radius: 4px; }
    .modal-scroll::-webkit-scrollbar { width: 6px; } .modal-scroll::-webkit-scrollbar-thumb { background: #5a6b6c; border-radius: 3px; }
    .modal-overlay { animation: fadeIn 0.15s ease; }
    .modal-card { animation: slideUp 0.15s ease; }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes slideUp { from { opacity:0; transform: translateY(10px) } to { opacity:1; transform: translateY(0) } }
</style>
</head>
<body class="bg-background text-on-surface font-body antialiased">
<main class="px-8 py-8 min-h-screen">
<!-- Header -->
<header class="mb-6 flex flex-col md:flex-row md:items-end justify-between gap-4">
    <div>
        <span class="text-xs font-bold text-error uppercase tracking-widest block mb-1">Devoluções</span>
        <h1 class="text-4xl font-extrabold font-headline text-primary tracking-tight">Trocas & Avarias</h1>
    </div>
    <button onclick="pyAdd()" class="px-6 py-2.5 rounded-lg font-bold text-sm bg-gradient-to-br from-error to-red-700 text-white hover:opacity-90 transition-all shadow-sm flex items-center gap-2">
        <span class="material-symbols-outlined text-[18px]">add_circle</span> Novo Registro Manual
    </button>
</header>
<!-- Metricas -->
<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
    <div class="bg-surface-container-lowest p-5 bento-leaf border border-slate-200/50 shadow-sm flex flex-col justify-center">
        <p class="text-xs font-bold text-on-surface-variant uppercase mb-1">Pendentes</p>
        <p class="text-3xl font-black text-[#FFD600]" id="met_pend">0</p>
    </div>
    <div class="bg-surface-container-lowest p-5 bento-leaf border border-slate-200/50 shadow-sm flex flex-col justify-center">
        <p class="text-xs font-bold text-on-surface-variant uppercase mb-1">Em Troca</p>
        <p class="text-3xl font-black text-[#1E88E5]" id="met_prog">0</p>
    </div>
    <div class="bg-surface-container-lowest p-5 bento-leaf border border-slate-200/50 shadow-sm flex flex-col justify-center">
        <p class="text-xs font-bold text-on-surface-variant uppercase mb-1">Resolvidos</p>
        <p class="text-3xl font-black text-[#00C853]" id="met_done">0</p>
    </div>
    <div class="bg-surface-container-lowest p-5 bento-leaf border border-slate-200/50 shadow-sm flex flex-col justify-center">
        <p class="text-xs font-bold text-on-surface-variant uppercase mb-1">Valor Total</p>
        <p class="text-3xl font-black text-error" id="met_val">R$ 0,00</p>
    </div>
</div>
<!-- Tools -->
<div class="bg-surface-container-lowest p-6 bento-leaf border border-slate-200/50 shadow-sm flex justify-between items-center mb-6">
    <div class="relative w-full max-w-sm">
        <input type="text" id="inp_search" placeholder="Buscar produto..." onkeyup="doSearch(event)" class="w-full pl-10 h-10 border border-surface-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none">
        <span class="material-symbols-outlined absolute left-3 top-2.5 text-on-surface-variant text-lg">search</span>
    </div>
    <div class="flex gap-2 text-sm text-on-surface-variant">
        <span id="val_count" class="font-bold flex items-center gap-2"><span class="material-symbols-outlined text-primary">swap_horiz</span> 0 itens cadastrados</span>
    </div>
</div>
<!-- Table -->
<div class="bg-surface-container-lowest bento-leaf border border-slate-200/50 shadow-sm overflow-hidden flex-1">
    <div class="overflow-x-auto">
        <table class="w-full text-left table-auto min-w-[800px]">
            <thead class="bg-surface-container-low">
                <tr>
                    <th class="px-6 py-3 text-xs font-bold uppercase text-on-surface-variant tracking-wider">Produto/Peca</th>
                    <th class="px-6 py-3 text-xs font-bold uppercase text-on-surface-variant tracking-wider w-24">Qtd</th>
                    <th class="px-6 py-3 text-xs font-bold uppercase text-on-surface-variant tracking-wider w-32">Status</th>
                    <th class="px-6 py-3 text-xs font-bold uppercase text-on-surface-variant tracking-wider">Motivo/Fornecedor</th>
                    <th class="px-6 py-3 text-xs font-bold uppercase text-on-surface-variant tracking-wider text-right w-40">Acoes</th>
                </tr>
            </thead>
            <tbody id="table_body" class="divide-y divide-surface">
                <!-- Injected via Python -->
            </tbody>
        </table>
    </div>
</div>
    </div>
</div>

<!-- Modal: Registro Manual de Troca -->
<div id="modal_exchange" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4 modal-overlay">
    <div class="bg-background bento-leaf w-full max-w-[480px] shadow-2xl flex flex-col max-h-[92vh] modal-card">
        <div class="px-6 pt-6 pb-4 border-b border-surface-variant flex items-center justify-between shrink-0">
            <div>
                <span class="text-[10px] font-bold text-error uppercase tracking-widest block mb-1">Pós-Venda</span>
                <h2 class="text-2xl font-extrabold font-headline text-primary">Novo Item de Troca</h2>
            </div>
            <button onclick="closeExchangeModal()" class="w-9 h-9 rounded-lg bg-surface-container hover:bg-surface-container-high flex items-center justify-center text-on-surface-variant transition-colors">
                <span class="material-symbols-outlined text-lg">close</span>
            </button>
        </div>

        <div class="overflow-y-auto flex-1 px-6 py-5 modal-scroll space-y-4">
            <div>
                <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Produto / Peça *</label>
                <input type="text" id="e_prod" placeholder="Nome ou código do produto..." class="w-full h-10 border border-surface-variant rounded-lg px-3 text-sm bg-surface-container-lowest focus:ring-1 focus:ring-primary outline-none"/>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Quantidade</label>
                    <input type="number" id="e_qty" value="1" min="1" class="w-full h-10 border border-surface-variant rounded-lg px-3 text-sm bg-surface-container-lowest outline-none"/>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Motive / Tipo</label>
                    <select id="e_motive" class="w-full h-10 border border-surface-variant rounded-lg px-3 text-sm bg-surface-container-lowest outline-none">
                        <option value="Avaria">Avaria de Estoque</option>
                        <option value="Defeito">Defeito Interno</option>
                        <option value="Troca Direta">Troca / Devolução</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Observações (Vendedor/Fornecedor)</label>
                <textarea id="e_obs" rows="3" placeholder="Detalhes da avaria ou vendedor responsável..." class="w-full border border-surface-variant rounded-lg px-3 py-2 text-sm bg-surface-container-lowest outline-none"></textarea>
            </div>
        </div>

        <div class="px-6 py-4 border-t border-surface-variant flex justify-end gap-3 shrink-0">
            <button onclick="closeExchangeModal()" class="px-5 py-2.5 rounded-lg font-bold text-sm bg-surface-container text-primary hover:bg-surface-container-high transition-colors">Cancelar</button>
            <button onclick="saveExchange()" class="px-6 py-2.5 rounded-lg font-bold text-sm bg-gradient-to-br from-primary to-primary-container text-on-primary hover:opacity-90 transition-all shadow-sm flex items-center gap-2">
                <span class="material-symbols-outlined text-[16px]">save</span> Registrar
            </button>
        </div>
    </div>
</div>

</main>
<script>
    function doSearch(e) { pySearch(); }
    function pySearch() {
        var q = document.getElementById('inp_search').value;
        window.location.href = "py://action/search?q=" + encodeURIComponent(q);
    }
    function pyAdd() { openExchangeModal(); }
    function pyStatus(id) { window.location.href = "py://action/status?id=" + encodeURIComponent(id); }
    function pyDel(id) { window.location.href = "py://action/del?id=" + encodeURIComponent(id); }
    function pyRetorno(id) { window.location.href = "py://action/retorno?id=" + encodeURIComponent(id); }
    function pyDescarte(id) {
        if (confirm("Registrar como DESCARTE? Isso cancela o valor desta peça na venda original e atualiza o histórico/dashboard automaticamente.")) {
            window.location.href = "py://action/descarte?id=" + encodeURIComponent(id);
        }
    }
    function pyDeleteRecord(id) { 
        if (confirm("Excluir este item de troca permanentemente?")) {
            window.location.href = "py://action/delete_record?id=" + encodeURIComponent(id); 
        }
    }
    
    // --- Modal Logic ---
    function openExchangeModal() {
        document.getElementById('e_prod').value = '';
        document.getElementById('e_qty').value = 1;
        document.getElementById('e_obs').value = '';
        document.getElementById('modal_exchange').classList.remove('hidden');
        document.getElementById('modal_exchange').classList.add('flex');
        setTimeout(() => document.getElementById('e_prod').focus(), 150);
    }
    function closeExchangeModal() {
        document.getElementById('modal_exchange').classList.add('hidden');
        document.getElementById('modal_exchange').classList.remove('flex');
    }
    function saveExchange() {
        var prod = document.getElementById('e_prod').value.trim();
        if(!prod) { alert("Informe o produto."); return; }
        var params = new URLSearchParams({
            prod: prod,
            qty: document.getElementById('e_qty').value,
            motive: document.getElementById('e_motive').value,
            obs: document.getElementById('e_obs').value.trim()
        });
        window.location.href = "py://action/save_manual_exchange?" + params.toString();
        closeExchangeModal();
    }
    
    function setTableData(htmlStr, qtStr, metrics) {
        document.getElementById('table_body').innerHTML = htmlStr;
        document.getElementById('val_count').innerHTML = '<span class="material-symbols-outlined text-primary">swap_horiz</span> ' + qtStr + ' itens cadastrados';
        if(metrics) {
            document.getElementById('met_pend').innerText = metrics.pend;
            document.getElementById('met_prog').innerText = metrics.prog;
            document.getElementById('met_done').innerText = metrics.done;
            document.getElementById('met_val').innerText = metrics.val;
        }
    }
</script>
</body></html>
