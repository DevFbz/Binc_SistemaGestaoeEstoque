<!DOCTYPE html>
<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
    darkMode: "class",
    theme: { extend: { colors: {
        "surface-container-highest": "#e0e3e3", "secondary": "#3d6a00",
        "primary": "#003336", "surface-container": "#ebeeee",
        "surface": "#f7fafa", "on-primary": "#ffffff", "surface-container-lowest": "#ffffff",
        "surface-variant": "#e0e3e3", "primary-container": "#004b50", "error-container": "#ffdad6",
        "background": "#f7fafa", "on-surface-variant": "#404849", "on-surface": "#181c1d",
        "surface-container-low": "#f1f4f4", "surface-container-high": "#e6e9e9", "error": "#ba1a1a"
    }, fontFamily: { "headline": ["Manrope"], "body": ["Inter"] } } }
}
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .bento-leaf { border-radius: 0.75rem 0.375rem 0.75rem 0.375rem; }
    body::-webkit-scrollbar { width: 8px; } body::-webkit-scrollbar-thumb { background: #b1edf2; border-radius: 4px; }
    .scroll-area::-webkit-scrollbar { width: 6px; } .scroll-area::-webkit-scrollbar-thumb { background: #b1edf2; border-radius: 3px; }
    input:focus, select:focus, textarea:focus { border-color: #003336 !important; box-shadow: 0 0 0 2px rgba(0,51,54,0.08); }
    input[type="range"] { accent-color: #003336; }
    input[type="checkbox"] { accent-color: #003336; }
    input[type="radio"] { accent-color: #003336; }
    .section-title {
        font-family: 'Manrope', sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #404849;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding-bottom: 0.75rem;
        border-bottom: 1.5px solid #e0e3e3;
        margin-bottom: 1.25rem;
    }
    .swatch-btn {
        width: 40px; height: 40px;
        border-radius: 8px;
        border: 3px solid transparent;
        cursor: pointer;
        transition: all 0.15s;
        position: relative;
    }
    .swatch-btn:hover { transform: scale(1.1); }
    .swatch-btn.selected { border-color: #003336; box-shadow: 0 0 0 2px #003336, 0 0 0 4px white; }
    .swatch-btn.selected::after {
        content: '✓';
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        color: white; font-size: 14px; font-weight: bold;
        text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
</style>
</head>
<body class="bg-background text-on-surface font-body antialiased">

<!-- Page Container -->
<div class="flex flex-col min-h-screen">

    <!-- Header -->
    <header class="px-8 py-6 border-b border-surface-variant bg-surface-container-lowest shrink-0">
        <span class="text-xs font-bold text-on-surface-variant uppercase tracking-widest block mb-1">Sistema</span>
        <h1 class="text-3xl font-extrabold font-headline text-primary tracking-tight">Configurações</h1>
    </header>

    <!-- Scrollable content -->
    <div class="flex-1 overflow-y-auto scroll-area px-8 py-8 space-y-8">

        <!-- ── Nota Fiscal Simples (PDF) ──────────────────────────────── -->
        <section class="bg-surface-container-lowest bento-leaf border border-slate-200/50 shadow-sm p-6">
            <div class="section-title">
                <span class="material-symbols-outlined text-primary text-lg">receipt</span>
                Nota Fiscal Simples (PDF)
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Nome da Loja *</label>
                    <input type="text" id="nf_nome" placeholder="MOTO PEÇAS & MECANICA" class="w-full h-10 border border-surface-variant rounded-lg px-3 text-sm"/>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Slogan</label>
                    <input type="text" id="nf_slogan" placeholder="Sistema de Gestão e Vendas" class="w-full h-10 border border-surface-variant rounded-lg px-3 text-sm"/>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Endereço</label>
                    <input type="text" id="nf_end" placeholder="Endereço completo da loja" class="w-full h-10 border border-surface-variant rounded-lg px-3 text-sm"/>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Telefone</label>
                    <input type="text" id="nf_tel" placeholder="(DD) XXXXX-XXXX" class="w-full h-10 border border-surface-variant rounded-lg px-3 text-sm"/>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">CNPJ</label>
                    <input type="text" id="nf_cnpj" placeholder="00.000.000/0001-00 (opcional)" class="w-full h-10 border border-surface-variant rounded-lg px-3 text-sm"/>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Rodapé da Nota</label>
                    <input type="text" id="nf_rodape" placeholder="Obrigado pela preferência!" class="w-full h-10 border border-surface-variant rounded-lg px-3 text-sm"/>
                </div>
            </div>
        </section>

        <!-- ── WhatsApp ───────────────────────────────────────────────── -->
        <section class="bg-surface-container-lowest bento-leaf border border-slate-200/50 shadow-sm p-6">
            <div class="section-title">
                <span class="material-symbols-outlined text-[#25D366] text-lg">chat</span>
                WhatsApp — Faltas & NPS
            </div>
            <div class="flex flex-col md:flex-row gap-4 items-start">
                <div class="flex-1">
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Meu Número WhatsApp</label>
                    <div class="relative">
                        <input type="text" id="wpp_num" placeholder="Ex: 21999999999 (com DDD, sem +55)" class="w-full h-10 border border-surface-variant rounded-lg px-3 pl-10 text-sm"/>
                        <span class="material-symbols-outlined absolute left-3 top-2.5 text-[#25D366] text-lg">phone</span>
                    </div>
                    <p class="text-xs text-on-surface-variant mt-1.5">Usado para receber notificações de faltas e pesquisas NPS.</p>
                </div>
            </div>
        </section>

        <!-- ── Comportamento ─────────────────────────────────────────── -->
        <section class="bg-surface-container-lowest bento-leaf border border-slate-200/50 shadow-sm p-6">
            <div class="section-title">
                <span class="material-symbols-outlined text-primary text-lg">settings</span>
                Comportamento do Sistema
            </div>
            <label class="flex items-center gap-3 p-4 bg-surface-container-low rounded-lg border border-surface-variant cursor-pointer hover:bg-surface-container transition-colors">
                <input type="checkbox" id="chk_fullscreen" class="w-4 h-4 rounded"/>
                <div>
                    <span class="block font-bold text-sm">Iniciar em Tela Cheia (Fullscreen)</span>
                    <span class="block text-xs text-on-surface-variant mt-0.5">Ao abrir o sistema, maximizar automaticamente na tela.</span>
                </div>
            </label>
        </section>

    </div>

    <!-- Footer fixo -->
    <div class="px-8 py-4 border-t border-surface-variant bg-surface-container-lowest/80 flex justify-end gap-3 shrink-0">
        <button onclick="pyClose()" class="px-5 py-2.5 rounded-lg font-bold text-sm bg-surface-container text-primary hover:bg-surface-container-high transition-colors">
            Cancelar
        </button>
        <button onclick="saveSettings()" class="px-6 py-2.5 rounded-lg font-bold text-sm bg-gradient-to-br from-primary to-primary-container text-on-primary hover:from-secondary hover:to-secondary-container transition-all shadow-sm flex items-center gap-2">
            <span class="material-symbols-outlined text-[16px]">save</span> Aplicar Configurações
        </button>
    </div>

</div>

<script>
    function initSettings(data) {
        data = data || {};
        var nf = data.nota_fiscal || {};

        // Nota Fiscal
        document.getElementById('nf_nome').value   = nf.nome_loja  || '';
        document.getElementById('nf_slogan').value = nf.slogan     || '';
        document.getElementById('nf_end').value    = nf.endereco   || '';
        document.getElementById('nf_tel').value    = nf.telefone   || '';
        document.getElementById('nf_cnpj').value   = nf.cnpj       || '';
        document.getElementById('nf_rodape').value = nf.rodape     || '';

        // WhatsApp
        document.getElementById('wpp_num').value = data.meu_whatsapp || '';

        // Comportamento
        document.getElementById('chk_fullscreen').checked = data.fullscreen || false;
    }

    function saveSettings() {
        var params = new URLSearchParams({
            nome_loja:   document.getElementById('nf_nome').value.trim()   || 'MOTO PECAS & MECANICA',
            slogan:      document.getElementById('nf_slogan').value.trim() || 'Sistema de Gestao e Vendas',
            endereco:    document.getElementById('nf_end').value.trim(),
            telefone:    document.getElementById('nf_tel').value.trim(),
            cnpj:        document.getElementById('nf_cnpj').value.trim(),
            rodape:      document.getElementById('nf_rodape').value.trim() || 'Obrigado pela preferencia!',
            meu_whatsapp: document.getElementById('wpp_num').value.trim(),
            fullscreen:  document.getElementById('chk_fullscreen').checked ? '1' : '0',
        });
        window.location.href = "py://action/save_settings?" + params.toString();
    }

    function pyClose() { window.location.href = "py://action/close_settings"; }
</script>
</body></html>
