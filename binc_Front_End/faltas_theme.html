<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
    darkMode: "class",
    theme: { extend: { colors: {
        "surface-container-highest": "#e0e3e3", "secondary": "#3d6a00",
        "primary": "#003336", "surface-container": "#ebeeee", "on-error-container": "#93000a",
        "surface": "#f7fafa", "on-primary": "#ffffff", "surface-container-lowest": "#ffffff",
        "surface-variant": "#e0e3e3", "primary-container": "#004b50", "error-container": "#ffdad6",
        "background": "#f7fafa", "on-surface-variant": "#404849", "on-surface": "#181c1d",
        "surface-container-high": "#e6e9e9", "error": "#ba1a1a"
    }, fontFamily: { "headline": ["Manrope"], "body": ["Inter"] } } }
}
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .bento-leaf { border-radius: 0.75rem 0.375rem 0.75rem 0.375rem; }
    body::-webkit-scrollbar { width: 8px; } body::-webkit-scrollbar-thumb { background: #b1edf2; border-radius: 4px; }
    .modal-scroll::-webkit-scrollbar { width: 6px; } .modal-scroll::-webkit-scrollbar-thumb { background: #b1edf2; border-radius: 3px; }
    .modal-overlay { animation: fadeIn 0.15s ease; }
    .modal-card { animation: slideUp 0.2s ease; }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes slideUp { from { opacity:0; transform: translateY(12px) } to { opacity:1; transform: translateY(0) } }
</style>
</head>
<body class="bg-background text-on-surface font-body antialiased">
<main class="px-8 py-8 min-h-screen">
<!-- Header -->
<header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
    <div>
        <span class="text-xs font-bold text-on-surface-variant uppercase tracking-widest block mb-1">Inventario</span>
        <h1 class="text-4xl font-extrabold font-headline text-primary tracking-tight">Produtos em Falta</h1>
    </div>
    <div class="flex gap-3">
        <button onclick="pyZap()" class="px-6 py-2.5 rounded-lg font-bold text-sm bg-[#25D366] text-white hover:bg-[#128C7E] transition-all shadow-sm flex items-center gap-2">
            <span class="material-symbols-outlined text-[18px]">send</span> Enviar Whatsapp
        </button>
        <button onclick="pyAdd()" class="px-6 py-2.5 rounded-lg font-bold text-sm bg-gradient-to-br from-primary to-primary-container text-on-primary hover:from-secondary hover:to-secondary-container transition-all shadow-sm flex items-center gap-2">
            <span class="material-symbols-outlined text-[18px]">add_circle</span> Registrar Falta
        </button>
    </div>
</header>
<!-- Tools -->
<div class="bg-surface-container-lowest p-6 bento-leaf border border-slate-200/50 shadow-sm flex justify-between items-center mb-6">
    <div class="flex gap-2 text-sm text-on-surface-variant">
        <span id="val_count" class="font-bold flex items-center gap-2"><span class="material-symbols-outlined text-primary">warning</span> 0 itens cadastrados</span>
    </div>
</div>
<!-- Table -->
<div class="bg-surface-container-lowest bento-leaf border border-slate-200/50 shadow-sm overflow-hidden flex-1">
    <div class="overflow-x-auto">
        <table class="w-full text-left table-auto min-w-[800px]">
            <thead class="bg-surface-container-low">
                <tr>
                    <th class="px-6 py-3 text-xs font-bold uppercase text-on-surface-variant tracking-wider w-40">Data</th>
                    <th class="px-6 py-3 text-xs font-bold uppercase text-on-surface-variant tracking-wider">Produto Requerido</th>
                    <th class="px-6 py-3 text-xs font-bold uppercase text-on-surface-variant tracking-wider">Solicitante</th>
                    <th class="px-6 py-3 text-xs font-bold uppercase text-on-surface-variant tracking-wider text-right w-36">Acoes</th>
                </tr>
            </thead>
            <tbody id="table_body" class="divide-y divide-surface">
                <!-- Injected via Python -->
            </tbody>
        </table>
    </div>
</div>

<!-- Modal: Registrar Falta -->
<div id="modal_falta" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4 modal-overlay">
    <div class="bg-background bento-leaf w-full max-w-[480px] shadow-2xl flex flex-col max-h-[92vh] modal-card">
        <!-- Header -->
        <div class="px-6 pt-6 pb-4 border-b border-surface-variant flex items-center justify-between shrink-0">
            <div>
                <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1">Inventário</span>
                <h2 id="modal_title" class="text-2xl font-extrabold font-headline text-primary">Registrar Falta</h2>
            </div>
            <button onclick="closeFaltaModal()" class="w-9 h-9 rounded-lg bg-surface-container hover:bg-surface-container-high flex items-center justify-center text-on-surface-variant transition-colors">
                <span class="material-symbols-outlined text-lg">close</span>
            </button>
        </div>

        <!-- Body -->
        <div class="overflow-y-auto flex-1 px-6 py-5 modal-scroll space-y-4">
            <div>
                <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Produto / Peça *</label>
                <input type="text" id="f_nome" placeholder="Nome do produto em falta..." class="w-full h-10 border border-surface-variant rounded-lg px-3 text-sm bg-surface-container-lowest focus:ring-1 focus:ring-primary outline-none"/>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Quantidade</label>
                    <input type="number" id="f_qtd" value="1" min="1" class="w-full h-10 border border-surface-variant rounded-lg px-3 text-sm bg-surface-container-lowest focus:ring-1 focus:ring-primary outline-none"/>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Urgência</label>
                    <select id="f_urg" class="w-full h-10 border border-surface-variant rounded-lg px-3 text-sm bg-surface-container-lowest focus:ring-1 focus:ring-primary outline-none">
                        <option value="Normal">Normal 🟢</option>
                        <option value="Alta">Alta 🟡</option>
                        <option value="Urgente">Urgente 🔴</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest block mb-1.5">Observações / Solicitante</label>
                <textarea id="f_obs" rows="3" placeholder="Ex: Cliente João fone 9xxxx-xxxx, ou referência do fornecedor..." class="w-full border border-surface-variant rounded-lg px-3 py-2 text-sm resize-none bg-surface-container-lowest focus:ring-1 focus:ring-primary outline-none"></textarea>
            </div>
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-surface-variant flex justify-end gap-3 shrink-0">
            <button onclick="closeFaltaModal()" class="px-5 py-2.5 rounded-lg font-bold text-sm bg-surface-container text-primary hover:bg-surface-container-high transition-colors">
                Cancelar
            </button>
            <button onclick="saveFalta()" class="px-6 py-2.5 rounded-lg font-bold text-sm bg-gradient-to-br from-primary to-primary-container text-on-primary hover:from-secondary hover:to-secondary-container transition-all shadow-sm flex items-center gap-2">
                <span class="material-symbols-outlined text-[16px]">save</span> Salvar Registro
            </button>
        </div>
    </div>
</div>

</main>
<script>
    var _current_falta_id = '';

    function pyAdd() { openFaltaModal(); }
    function pyEdit(id, data) { openFaltaModal(data); }
    function pyDel(id) { 
        if(confirm("Deseja excluir este registro de falta?")) {
            window.location.href = "py://action/del?id=" + encodeURIComponent(id); 
        }
    }
    function pyZap() { window.location.href = "py://action/zap"; }
    
    function setTableData(htmlStr, qtStr) {
        document.getElementById('table_body').innerHTML = htmlStr;
        document.getElementById('val_count').innerHTML = '<span class="material-symbols-outlined text-primary">warning</span> ' + qtStr + ' itens cadastrados';
    }

    // --- Modal Logic ---
    function openFaltaModal(data) {
        data = data || {};
        _current_falta_id = data.id || '';
        document.getElementById('modal_title').innerText = _current_falta_id ? 'Editar Falta' : 'Registrar Falta';
        
        document.getElementById('f_nome').value = data.nome || '';
        document.getElementById('f_qtd').value = data.qtd || 1;
        document.getElementById('f_urg').value = data.urgencia || 'Normal';
        document.getElementById('f_obs').value = data.obs || '';
        
        document.getElementById('modal_falta').classList.remove('hidden');
        document.getElementById('modal_falta').classList.add('flex');
        setTimeout(() => document.getElementById('f_nome').focus(), 100);
    }

    function closeFaltaModal() {
        document.getElementById('modal_falta').classList.add('hidden');
        document.getElementById('modal_falta').classList.remove('flex');
    }

    function saveFalta() {
        var nome = document.getElementById('f_nome').value.trim();
        if(!nome) { alert("Informe o nome do produto."); return; }
        
        var params = new URLSearchParams({
            id: _current_falta_id,
            nome: nome,
            qtd: document.getElementById('f_qtd').value,
            urgencia: document.getElementById('f_urg').value,
            obs: document.getElementById('f_obs').value.trim()
        });
        
        window.location.href = "py://action/save_modal?" + params.toString();
        closeFaltaModal();
    }
</script>
</body></html>
